name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 11.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Type check
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

      - name: Check error documentation is up to date
        run: pnpm run docs:errors:check

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 30

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-outputs
          path: packages/*/dist/
          retention-days: 7

      - name: Download base branch coverage
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        continue-on-error: true
        id: download-coverage
        with:
          workflow: ci.yml
          branch: ${{ github.base_ref }}
          name: coverage-reports
          path: base-coverage/

      - name: Check coverage decrease
        if: github.event_name == 'pull_request'
        run: node --experimental-strip-types scripts/ci/check-coverage-decrease.ts

      - name: Report coverage
        if: github.event_name == 'pull_request' && always()
        uses: davelosert/vitest-coverage-report-action@3c50566c523e04813df28de8f7c48dd97d663f1c # v2.11.2
        with:
          name: 'Combined Coverage'
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: 'changes'

      - name: Check for spec-relevant changes
        if: github.event_name == 'pull_request'
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            spec-relevant:
              - 'packages/**'
              - 'tests/spec-validation/**'

      - name: Run spec validation
        if: github.event_name == 'pull_request' && steps.changes.outputs.spec-relevant == 'true'
        id: spec-validate
        run: |
          pnpm run spec:validate --report spec-report --markdown > spec-summary.md

      - name: Upload spec validation report
        if: github.event_name == 'pull_request' && always() && steps.spec-validate.outcome != 'skipped'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spec-validation-report
          path: spec-report/
          retention-days: 30

      - name: Comment spec validation summary
        if: github.event_name == 'pull_request' && always() && steps.spec-validate.outcome != 'skipped'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: spec-validation
          path: spec-summary.md
