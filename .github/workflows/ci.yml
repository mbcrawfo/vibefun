name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Type check
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

      - name: Check error documentation is up to date
        run: pnpm run docs:errors:check

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 30

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: packages/*/dist/
          retention-days: 7

      - name: Download base branch coverage
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v11
        continue-on-error: true
        id: download-coverage
        with:
          workflow: ci.yml
          branch: ${{ github.base_ref }}
          name: coverage-reports
          path: base-coverage/

      - name: Check coverage decrease
        if: github.event_name == 'pull_request'
        run: node --experimental-strip-types scripts/ci/check-coverage-decrease.ts

      - name: Report coverage
        if: github.event_name == 'pull_request' && always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: 'Combined Coverage'
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: 'changes'

      - name: Check for spec-relevant changes
        if: github.event_name == 'pull_request'
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            spec-relevant:
              - 'packages/**'
              - 'tests/spec-validation/**'

      - name: Run spec validation
        if: github.event_name == 'pull_request' && steps.changes.outputs.spec-relevant == 'true'
        id: spec-validate
        run: |
          pnpm run spec:validate --report spec-report --markdown > spec-summary.md

      - name: Upload spec validation report
        if: github.event_name == 'pull_request' && always() && steps.spec-validate.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: spec-validation-report
          path: spec-report/
          retention-days: 30

      - name: Comment spec validation summary
        if: github.event_name == 'pull_request' && always() && steps.spec-validate.outcome != 'skipped'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: spec-validation
          path: spec-summary.md
