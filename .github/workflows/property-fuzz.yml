name: Property Fuzz (weekly)

# Runs the test suite with fast-check in unseeded mode and a much larger numRuns
# budget to find long-tail bugs that the deterministic per-PR run can't.
# Failures are surfaced as workflow errors; if they uncover a bug, pin the seed
# and convert it to a regression test.

permissions:
  contents: read

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:
    inputs:
      num_runs:
        description: "fast-check numRuns override"
        required: false
        default: "1000"
      seed:
        description: "fast-check seed override (pass an integer to reproduce a failure, or 'random')"
        required: false
        default: "random"

jobs:
  fuzz:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 11.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run tests with fast-check fuzz
        env:
          FC_NUM_RUNS: ${{ github.event.inputs.num_runs || '1000' }}
          FC_SEED: ${{ github.event.inputs.seed || 'random' }}
        run: pnpm run test
